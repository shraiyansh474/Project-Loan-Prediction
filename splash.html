<!DOCTYPE html>

<html>

<head>

<title>Loan Prediction AI</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#020617;
color:white;
font-family:Segoe UI;
overflow:hidden;
}

/* Animated Text */

h1{
font-size:48px;
letter-spacing:4px;
animation:glow 2s infinite alternate;
}

@keyframes glow{

from{
text-shadow:0 0 10px #38bdf8;
}

to{
text-shadow:0 0 30px #38bdf8,0 0 60px #0ea5e9;
}

}

/* Loading animation */

.loader{
margin-top:30px;
display:flex;
gap:10px;
}

.loader span{
width:12px;
height:12px;
background:#38bdf8;
border-radius:50%;
animation:bounce 0.6s infinite alternate;
}

.loader span:nth-child(2){
animation-delay:.2s;
}

.loader span:nth-child(3){
animation-delay:.4s;
}

@keyframes bounce{

from{transform:translateY(0)}
to{transform:translateY(-12px)}

}

</style>

</head>

<body>

<div>

<h1>Loan Prediction System</h1>

<div class="loader">
<span></span>
<span></span>
<span></span>
</div>

</div>

<script>

/* Auto redirect after 3 seconds */

setTimeout(function(){

window.location.href="/dashboard"

},3000)

</script>

</body>

</html>
